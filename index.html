<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Guardrails is a lightweight game of life simulator about agency, responsibility, parenting, and support systems."
    />
    <title>Guardrails</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hud" aria-label="Game status">
        <div class="brand">
          <h1>Guardrails</h1>
          <p id="stageLine">Early Childhood</p>
        </div>
        <div class="meters" id="meters"></div>
      </section>

      <section class="game-frame" aria-label="Guardrails game">
        <canvas id="gameCanvas" width="900" height="1400"></canvas>
        <div class="message-log" id="messageLog" aria-live="polite"></div>
      </section>

      <section class="controls" aria-label="Game controls">
        <button class="icon-button" id="slowButton" type="button" aria-label="Slow down" title="Slow down">
          <span aria-hidden="true">−</span>
        </button>
        <div class="steer-pad">
          <button id="leftButton" type="button" aria-label="Steer left" title="Steer left">
            <span aria-hidden="true">←</span>
          </button>
          <button id="rightButton" type="button" aria-label="Steer right" title="Steer right">
            <span aria-hidden="true">→</span>
          </button>
        </div>
        <button class="icon-button" id="fastButton" type="button" aria-label="Speed up" title="Speed up">
          <span aria-hidden="true">+</span>
        </button>
        <button class="action-button" id="guardrailButton" type="button">Build Guardrail</button>
        <button class="action-button" id="kidButton" type="button">Add Kid</button>
        <button class="action-button subtle" id="pauseButton" type="button">Pause</button>
      </section>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
